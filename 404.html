<!DOCTYPE html>
<html>
<head>
<script>
  var path = location.pathname;
  var map = {
    '/pace': '/Pace',
    '/pace/pacear': '/Pace/PaceAr',
    '/pace/pacearguide': '/Pace/PaceArGuide',
    '/pace/pacedubguide': '/Pace/PaceDubGuide',
  };
  var lower = path.toLowerCase();
  if (map[lower]) {
    location.replace(map[lower]);
  } else if (lower.startsWith('/pace')) {
    location.replace('/Pace/PaceAr');
  }
</script>
</head>
</html>
